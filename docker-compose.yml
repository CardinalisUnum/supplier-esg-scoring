services:
  generator:
    build:
      context: .
    command: python -m src.run_pipeline --n-suppliers 500 --db-path data/esg_simulation.db --seed 42
    volumes:
      - ./:/workspace

  streamlit:
    build:
      context: .
    command: streamlit run app/main.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    volumes:
      - ./:/workspace
    depends_on:
      - generator
